name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  electron:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/electron/package-lock.json

      - name: Install dependencies
        working-directory: apps/electron
        run: npm ci

      - name: Build
        working-directory: apps/electron
        run: npm run build

      - name: Local-only smoke tests
        working-directory: apps/electron
        run: |
          npx vitest run \
            src/pages/__tests__/Settings.test.tsx \
            electron/main/services/__tests__/transcription.test.ts \
            electron/main/ipc/__tests__/recording-handlers.test.ts
